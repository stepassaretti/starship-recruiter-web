<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starship Recruiter - Legacy Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e5e5e5;
            --fg: #000000;
            --font-main: 'VT323', monospace;
            --step: 2px;
            --stroke: 2px;
            --dither: conic-gradient(#000 0.25turn, transparent 0.25turn 0.5turn, #000 0.5turn 0.75turn, transparent 0.75turn);
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }

        *, *::before, *::after { box-sizing: border-box; }

        /* ══════════════════════════════════════════════
           GEOMETRY CORNERS
        ══════════════════════════════════════════════ */
        .pixel-notch {
            clip-path: polygon(
                0% var(--step), var(--step) var(--step), var(--step) 0%,
                calc(100% - var(--step)) 0%, calc(100% - var(--step)) var(--step), 100% var(--step),
                100% calc(100% - var(--step)), calc(100% - var(--step)) calc(100% - var(--step)), calc(100% - var(--step)) 100%,
                var(--step) 100%, var(--step) calc(100% - var(--step)), 0% calc(100% - var(--step))
            );
        }

        .pixel-staircase {
            clip-path: polygon(
                0 4px, 2px 4px, 2px 2px, 4px 2px, 4px 0,
                calc(100% - 4px) 0, calc(100% - 4px) 2px, calc(100% - 2px) 2px, calc(100% - 2px) 4px, 100% 4px,
                100% calc(100% - 4px), calc(100% - 2px) calc(100% - 4px), calc(100% - 2px) calc(100% - 2px), calc(100% - 4px) calc(100% - 2px), calc(100% - 4px) 100%,
                4px 100%, 4px calc(100% - 2px), 2px calc(100% - 2px), 2px calc(100% - 4px), 0 calc(100% - 4px)
            );
        }

        /* ══════════════════════════════════════════════
           LAYOUT (SCALED FOR PREVIEW)
        ══════════════════════════════════════════════ */
        .header {
            border-bottom: 2px solid var(--fg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: #fff;
            z-index: 100;
        }

        .header-title { font-size: 24px; font-weight: bold; text-transform: uppercase; letter-spacing: -0.04em; }
        .header-stats { font-size: 22px; display: flex; gap: 20px; }

        .main-area {
            flex: 1;
            display: flex;
            overflow-x: auto; 
            overflow-y: hidden;
        }

        .col {
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            border-right: 2px solid var(--fg);
        }
        .col-left { width: 240px; flex-shrink: 0; background: #fff; }
        
        .col-center { 
            flex: 1; 
            min-width: 480px; 
            position: relative; 
            background-color: #ffffff;
            background-image: radial-gradient(circle at 1px 1px, #000 1px, transparent 0);
            background-size: 20px 20px;
        } 
        
        .col-right { width: 280px; flex-shrink: 0; background: #fff; border-right: none; }

        .section-title { 
            font-size: 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
            border-bottom: none; 
            padding-bottom: 8px; 
            margin-bottom: 12px; 
            background-image: linear-gradient(to right, #000 50%, transparent 50%);
            background-size: 4px 2px;
            background-position: bottom;
            background-repeat: repeat-x;
        }

        /* ══════════════════════════════════════════════
           COMPONENTS
        ══════════════════════════════════════════════ */
        .ui-tag { background: #000; color: #fff; padding: 4px 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; line-height: 1; text-transform: uppercase; }
        .ui-tag.outline { background: #fff; color: #000; border: 2px solid #000; padding: 2px 4px; }

        .mission-card { border: 2px solid var(--fg); padding: 12px; margin-bottom: 20px; background: #fff; }
        .mission-title { font-size: 22px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; line-height: 1; }
        .mission-detail { font-size: 18px; margin-top: 8px; }

        .manual-entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px dotted #000; }
        .manual-name { font-size: 20px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .manual-desc { font-size: 16px; line-height: 1.1; margin-top: 4px; }
        .manual-hates { font-size: 16px; margin-top: 4px; }

        /* ══════════════════════════════════════════════
           CARD STRUCTURE & DRAG PHYSICS (SCALED)
        ══════════════════════════════════════════════ */
        .pool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 220px);
            justify-content: center;
            gap: 16px;
            align-content: start;
        }

        .card-stack { position: relative; width: 220px; height: auto; margin: 0 auto; }
        .card-placeholder { width: 100%; height: 100%; border: none; background: transparent; }

        .drag-wrapper { position: relative; width: 100%; height: auto; cursor: grab; z-index: 10; touch-action: none; }
        .drag-wrapper:active { cursor: grabbing; }

        .card-shadow {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--dither); background-size: 2px 2px;
            z-index: 1; opacity: 0; pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.2, 0, 0.3, 1), opacity 0.2s ease-out;
        }

        .drag-wrapper:hover .card-shadow { opacity: 1; transform: translate(-6px, 6px); }
        .drag-wrapper.dragging { z-index: 1000; }
        .drag-wrapper.dragging .card-shadow { opacity: 1; transform: translate(-15px, 15px); transition: none; }

        .card-container {
            width: 100%; height: auto; background: var(--fg); padding: var(--stroke);
            position: relative; z-index: 2; transition: transform 0.2s cubic-bezier(0.2, 0, 0.3, 1);
        }
        .drag-wrapper:hover .card-container { transform: translateY(-4px); }
        .drag-wrapper.dragging .card-container { transform: translateY(0); }

        .card-content {
            width: 100%; height: auto; background: #ffffff; padding: 10px 12px;
            display: flex; flex-direction: column; gap: 4px; overflow: hidden;
        }
        .card-head { display: flex; justify-content: space-between; align-items: center; }
        .card-name { font-size: 20px; line-height: 0.84; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .avatar-box {
            width: 100%; height: 140px; background: #ffffff; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; margin: 4px 0; flex-shrink: 0; overflow: hidden;
        }

        .card-div { height: 2px; background-image: linear-gradient(to right, #000 50%, transparent 50%); background-size: 4px 2px; background-repeat: repeat-x; margin: 2px 0; border: none; flex-shrink: 0; }

        .card-skills { font-size: 20px; line-height: 1; display: flex; justify-content: space-between; width: 100%; }
        /* Underline the required stat */
        .hi-stat { font-weight: bold; text-decoration: underline; }
        
        .card-exp { font-size: 20px; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .card-salary { font-size: 20px; font-weight: bold; line-height: 1; }

        .hate-row { display: flex; align-items: center; gap: 6px; }
        .hate-lbl { font-size: 20px; line-height: 1; flex-shrink: 0; }
        .hate-outer { width: 40px; height: 10px; border: 2px solid #000; background: #fff; position: relative; overflow: hidden; }
        .hate-fill { position: absolute; inset: 0; right: auto; background-image: var(--dither); background-size: 2px 2px; }
        .hate-pct { font-size: 20px; line-height: 1; }

        /* ══════════════════════════════════════════════
           SHIP & ROSTER SLOTS
        ══════════════════════════════════════════════ */
        .ship-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        
        .roster-grid {
            display: flex; flex-direction: column; gap: 12px; margin-bottom: 8px;
        }

        .target-slot {
            width: 100%; height: 48px;
            display: flex; justify-content: center; align-items: center; position: relative;
            font-size: 22px; color: #000; text-transform: none;
            background-image: linear-gradient(to right, #000 50%, transparent 50%), linear-gradient(to bottom, #000 50%, transparent 50%), linear-gradient(to right, #000 50%, transparent 50%), linear-gradient(to bottom, #000 50%, transparent 50%);
            background-size: 8px 2px, 2px 8px, 8px 2px, 2px 8px;
            background-position: top, right, bottom, left; background-repeat: repeat-x, repeat-y, repeat-x, repeat-y;
            transition: background-color 0.2s;
        }
        
        /* Dither overlay active state matching button hover */
        .target-slot.drag-over { 
            background-color: #fff !important;
            background-image: var(--dither) !important;
            background-size: 2px 2px !important;
            border: 2px solid #000 !important;
        }

        .roster-card-mini {
            width: 100%; height: 100%; background: #000; color: #fff; padding: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .roster-card-mini:hover { background: #333; }
        
        .btn-primary-wrapper { background: #000; padding: var(--stroke); display: inline-block; cursor: pointer; transition: transform 0.1s; width: 100%; }
        .btn-primary-wrapper:active { transform: translateY(2px); }
        .btn-primary-content { background: #fff; color: #000; border: none; padding: 12px; font-family: var(--font-main); font-weight: bold; font-size: 20px; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-primary-wrapper:hover .btn-primary-content { background-image: var(--dither) !important; background-size: 2px 2px !important; }
        .btn-primary-wrapper.disabled { opacity: 0.5; pointer-events: none; }

        .bottom-actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            width: 100%;
        }

        .payroll { font-size: 20px; font-weight: bold; text-align: left; margin-bottom: 0; line-height: 1.1; flex-shrink: 0; }

        /* ══════════════════════════════════════════════
           MODAL
        ══════════════════════════════════════════════ */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(229, 229, 229, 0.9); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal {
            background: #fff; border: 4px solid #000; padding: 30px; width: 500px;
            box-shadow: 8px 8px 0 #000; display: flex; flex-direction: column;
        }
        .modal h2 { margin: 0 0 15px 0; font-size: 32px; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; }
        .modal-score { font-size: 64px; font-weight: bold; margin: 10px 0; text-align: center; }
        .modal-log { border: 2px dashed #000; height: 180px; overflow-y: auto; padding: 10px; font-size: 18px; margin-bottom: 20px; background: #fafafa; }
        
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">STARSHIP RECRUITER // V4.0</div>
    <div class="header-stats">
        <span>DAY <span id="ui-day">1</span></span>
        <span style="font-weight:bold;"><span id="ui-money">800</span> CR</span>
    </div>
</div>

<div class="main-area">
    <!-- LEFT: MISSION & MANUAL -->
    <div class="col col-left">
        <div class="section-title">MISSION INTEL</div>
        <div class="mission-card pixel-notch" id="ui-mission">
            <!-- Populated by JS -->
        </div>

        <div class="section-title">XENO-BIOLOGY MANUAL</div>
        <div id="ui-manual">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- CENTER: APPLICANTS -->
    <div class="col col-center" id="pool-area">
        <div class="section-title" id="pool-title" style="background-image: none; padding-bottom: 0;">APPLICANTS (0)</div>
        <div class="pool-grid" id="pool-grid">
            <!-- Cards go here -->
        </div>
    </div>

    <!-- RIGHT: SHIP ROSTER -->
    <div class="col col-right" id="right-panel">
        <div class="ship-header">
            <div class="section-title" style="border:none; margin:0; padding:0; padding-bottom: 0; background-image: none;">SHIP MANIFEST</div>
            <div style="font-size: 20px; font-weight: normal;" id="ui-ship-name">Scout (0/5)</div>
        </div>
        
        <div style="height: 2px; background-image: linear-gradient(to right, #000 50%, transparent 50%); background-size: 4px 2px; background-repeat: repeat-x; margin-bottom: 12px;"></div>

        <div class="roster-grid" id="roster-grid">
            <!-- Target slots go here -->
        </div>
        
        <div id="ui-ship-min" style="font-size: 20px; font-weight: normal; text-align: left; margin-bottom: 12px; text-transform: uppercase;">MIN: 0</div>

        <div class="bottom-actions">
            <div class="payroll">PAYROLL: <span id="ui-payroll">0</span> CR</div>
            <div class="btn-primary-wrapper pixel-notch" id="btn-launch-wrap">
                <button class="btn-primary-content pixel-notch" onclick="launchMission()">LAUNCH MISSION</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="overlay" id="result-overlay">
    <div class="modal pixel-notch">
        <h2 id="res-title">DEBRIEFING</h2>
        <div class="modal-score" id="res-score">100%</div>
        <div id="res-msg" style="font-size:22px; font-weight:bold; text-align:center; margin-bottom:15px;">Success</div>
        <div class="modal-log" id="res-log"></div>
        <div class="btn-primary-wrapper pixel-notch" style="margin-top:0;">
            <button id="modal-btn" class="btn-primary-content pixel-notch" onclick="nextDay()">CONTINUE</button>
        </div>
    </div>
</div>

    };

    const NAMES = ["Zog", "Blorp", "Kev", "Lara", "Grom", "Vok", "Nebula", "Starla", "Rex", "Tkt"];
    const ROLES = ["COMMAND", "OPERATIONS", "SCIENCE", "FORCE", "LOGISTICS"];

    let state = {
        day: 1,
        money: 800, 
        pool: [],
        roster: [], 
        mission: null,
        ship: null,
        gameOver: false
    };

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    
    function generateApplicant(id) {
        const races = Object.keys(RACES);
        let available = races.slice(0, Math.min(6 + Math.floor(state.day/2), races.length));
        const raceKey = available[rand(0, available.length - 1)];
        const rd = RACES[raceKey];

        let str = rand(rd.str[0], rd.str[1]);
        let int = rand(rd.int[0], rd.int[1]);
        let cha = rand(rd.cha[0], rd.cha[1]);
        let hate = rand(0, 100);

        // Enforce Biological Traits to not generate Saboteurs by default
        if (raceKey === "Sugorian") hate = rand(0, 50);
        if (raceKey === "Blorg") hate = rand(0, 20);
        if (raceKey === "Sky-Elf") { int = Math.max(str, cha) + rand(1, 10); }
        if (raceKey === "Human") { while (str === int && int === cha) { str++; } }
        if (raceKey === "Beetlegunner") { str = Math.max(str, cha + 1); }
        if (raceKey === "Giant") { str = int + cha + rand(1, 10); }
        if (raceKey === "Robomantoid") { hate = rand(20, 100); }
        if (raceKey === "Barbitulian") { int = cha; }
        if (raceKey === "Cheesponge" || raceKey === "Aquasim") { str = Math.min(int, cha) - rand(1, 5); if (str < 1) str = 1; }
        if (raceKey === "Space-Cat") { cha = Math.max(str, int) + rand(1, 10); }
        if (raceKey === "Velkhorian") { hate = rand(0, 60); }
        if (raceKey === "Fungi" || raceKey === "Drakhen") { hate = rand(80, 100); }
        if (raceKey === "Drakhen") { int = str; }
        if (raceKey === "Void-Demon") { cha = str + rand(1, 10); hate = rand(0, 10); }
        if (raceKey === "Oak-Person") { cha = rand(1, 4); }
        if (raceKey === "Long-Neck" || raceKey === "Squid") { int = str + rand(1, 10); }
        if (raceKey === "Sodio") { str = Math.max(str, int + 1); }

        // This removes ALL dashes from the race name so "Sky-Elf" becomes "skyelf" for the image path
        const safeRaceName = raceKey.toLowerCase().replace(/-/g, '');
        const maxImgs = rd.images || 12;
        const portraitVariant = rand(1, maxImgs);

        // Map Specific Names to Specific Images
        let mappedName = getNameFor(raceKey, portraitVariant);
        let finalName = mappedName ? mappedName : NAMES[rand(0, NAMES.length - 1)];

        // Only append numbers to Droids if they don't have a mapped name
        if (raceKey === "Droid" && !mappedName) { finalName += "-" + rand(1, 99); }

        return {
            id: id,
            name: finalName,
            race: raceKey,
            str: str, int: int, cha: cha, hate: hate,
            exp: ROLES[rand(0, ROLES.length - 1)],
            portrait: `images/${safeRaceName}_portrait_${portraitVariant}.png`,
            cost: Math.floor((str + int + cha) * 1.5) + rand(5, 15)
        };
    }

    function generateMission() {
        const types = [
            { id: "ASSAULT", stat: ["str"], t: 1 },
            { id: "DIPLOMACY", stat: ["cha"], t: 1 },
            { id: "RESEARCH", stat: ["int"], t: 1 },
            { id: "RESCUE", stat: ["str", "int"], t: 2 },
            { id: "SMUGGLING", stat: ["int", "cha"], t: 2 },
            { id: "EVACUATION", stat: ["str", "int", "cha"], t: 3 }
        ];
        
        let available = types.filter(t => t.t === 1);
        if (state.day > 4) available = available.concat(types.filter(t => t.t === 2));
        if (state.day > 8) available = available.concat(types.filter(t => t.t === 3));

        const m = available[rand(0, available.length - 1)];
        
        // STEEPER DIFFICULTY SCALING
        const targetBase = 45 + Math.floor(state.day * 7.5); 

        let targets = {};
        m.stat.forEach(s => targets[s] = targetBase + rand(-5, 5));

        return {
            title: m.id + " OP-" + rand(100, 999),
            type: m.id,
            reqs: m.stat,
            targets: targets,
            // STEEPER MIN SUCCESS SCALING (Starts at 66, goes up to 95)
            minReq: Math.min(95, 65 + Math.floor(state.day * 1.2)),
            reward: 500 + (state.day * 90)
        };
    }

    function updateShip() {
        // Updated min crew rules: Speeder min 3, Scout min 4
        if (state.day <= 3) state.ship = { name: "Speeder", max: 5, min: 3 };
        else if (state.day <= 6) state.ship = { name: "Scout", max: 6, min: 4 };
        else if (state.day <= 10) state.ship = { name: "Gunship", max: 7, min: 4 };
        else state.ship = { name: "Destroyer", max: 8, min: 5 };

        state.roster = new Array(state.ship.max).fill(null);
    }

    function startDay() {
        updateShip();
        state.mission = generateMission();
        
        const poolSize = 6 + Math.floor(state.day / 2);
        state.pool = [];
        let attempts = 0;
        
        // Keep generating until the pool is full of unique applicants
        while(state.pool.length < poolSize && attempts < 200) {
            let newApp = generateApplicant(state.pool.length);
            
            // Check if someone with this exact name is already in the pool
            let isDuplicate = state.pool.some(a => a.name === newApp.name);
            
            if (!isDuplicate) {
                state.pool.push(newApp);
            }
            attempts++;
        }

        updateUI();
    }

    // ══════════════════════════════════════════════
    // RENDER LOGIC
    // ══════════════════════════════════════════════

    function updateUI() {
        // Dynamic Applicant Count
        const remainingCount = state.pool.filter(app => !state.roster.find(a => a && a.id === app.id)).length;
        document.getElementById('pool-title').innerText = `APPLICANTS (${remainingCount})`;

        // Roster Slots
        const rGrid = document.getElementById('roster-grid');
        rGrid.innerHTML = "";
        let currentCrewCount = 0;

        for(let i=0; i<state.ship.max; i++) {
            const slotId = i;

            const slotDiv = document.createElement('div');

                slotDiv.innerHTML = `

                            <div style="display:flex; flex-direction:column; align-items:flex-start;">

            }
            rGrid.appendChild(slotDiv);
        }

        document.getElementById('ui-ship-name').innerText = `${state.ship.name} (${currentCrewCount}/${state.ship.max})`;
        document.getElementById('ui-ship-min').innerText = `MIN: ${state.ship.min}`;
        document.getElementById('ui-payroll').innerText = currentCost;
        
        // Credit display dynamically accounts for current payroll
        document.getElementById('ui-day').innerText = state.day;
        document.getElementById('ui-money').innerText = state.money - currentCost;

        const launchBtn = document.getElementById('btn-launch-wrap');
        if (currentCrewCount > 0) launchBtn.classList.remove('disabled');
        else launchBtn.classList.add('disabled');

        // Pool
        const pGrid = document.getElementById('pool-grid');
        pGrid.innerHTML = "";
        state.pool.forEach(app => {
            // Hide if hired
            if (state.roster.find(a => a && a.id === app.id)) return;

            const rd = RACES[app.race];
            const hl = (s) => m.reqs.includes(s) ? 'hi-stat' : '';

            el.innerHTML = `
                <div class="drag-wrapper" data-id="${app.id}">

                                    <div class="hate-lbl">HATE</div>

    // ══════════════════════════════════════════════
    // DRAG & DROP PHYSICS (Pointer Events + Click)
    // ══════════════════════════════════════════════
    let activeCard = null;
    let startX = 0, startY = 0;
    let placeholder = null;
    let originalParent = null;
    let hasMoved = false;

    function bindDragEvents() {
        const wrappers = document.querySelectorAll('.drag-wrapper');

        wrappers.forEach(card => {
            card.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                
                activeCard = card;
                originalParent = card.parentElement;
                hasMoved = false;
                
                const rect = card.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;

                placeholder = document.createElement('div');
                placeholder.className = 'card-placeholder pixel-staircase';
                originalParent.appendChild(placeholder);

                card.style.width = rect.width + 'px';
                card.style.height = rect.height + 'px';
                card.style.left = rect.left + 'px';
                card.style.top = rect.top + 'px';
                card.style.position = 'fixed';
                card.style.zIndex = '1000';
                card.classList.add('dragging');
                
                card.setPointerCapture(e.pointerId);
                e.preventDefault();
            });
        });
    }

    document.addEventListener('pointermove', (e) => {
        if (!activeCard) return;
        hasMoved = true;
        
        activeCard.style.left = (e.clientX - startX) + 'px';
        activeCard.style.top = (e.clientY - startY) + 'px';

        const slots = document.querySelectorAll('.target-slot');
        let hoveringPanel = false;

        // Check if cursor is over the right panel at all
        const rightPanel = document.getElementById('right-panel');
        if (rightPanel) {
            const rpRect = rightPanel.getBoundingClientRect();
            if (e.clientX > rpRect.left && e.clientX < rpRect.right && e.clientY > rpRect.top && e.clientY < rpRect.bottom) {
                hoveringPanel = true;
            }
        }

        // Clean up all slots first
        slots.forEach(slot => {
            slot.classList.remove('drag-over');
            // If hovering directly over a slot (might be outside the panel bounds technically), also count it
            if (isOverSlot(e.clientX, e.clientY, slot)) {
                hoveringPanel = true;
            }
        });

        // If hovering anywhere in the right panel zone, highlight the FIRST available slot
        if (hoveringPanel) {
            const firstEmptyIndex = state.roster.findIndex(a => a === null);
            if (firstEmptyIndex !== -1) {
                const targetSlotEl = document.querySelector(`.target-slot[data-slot-id="${firstEmptyIndex}"]`);
                if (targetSlotEl) {
                    targetSlotEl.classList.add('drag-over');
                }
            }
        }
    });

    document.addEventListener('pointerup', (e) => {
        if (!activeCard) return;

        const card = activeCard;
        card.releasePointerCapture(e.pointerId);
        card.classList.remove('dragging');
        
        const slots = document.querySelectorAll('.target-slot');
        slots.forEach(s => s.classList.remove('drag-over'));

        const appId = parseInt(card.dataset.id);

        if (!hasMoved) {
            if(placeholder) placeholder.remove();
            resetCardStyles(card);

            const firstEmptySlot = state.roster.findIndex(a => a === null);
            if (firstEmptySlot !== -1) {
                assignToSlot(appId, firstEmptySlot);
            } else {
                updateUI();
            }
            activeCard = null;
            return;
        }

        card.style.transition = 'top 0.15s cubic-bezier(0.2,0,0.3,1), left 0.15s cubic-bezier(0.2,0,0.3,1)';

        let targetX, targetY;
        let targetSlotId = null;

        let droppedInPanel = false;
        
        // Check drop over right panel
        const rightPanel = document.getElementById('right-panel');
        if (rightPanel) {
            const rpRect = rightPanel.getBoundingClientRect();
            if (e.clientX > rpRect.left && e.clientX < rpRect.right && e.clientY > rpRect.top && e.clientY < rpRect.bottom) {
                droppedInPanel = true;
            }
        }
        
        // Check direct slot drop just in case
        for(let slot of slots) {
            if (isOverSlot(e.clientX, e.clientY, slot)) {
                droppedInPanel = true;
                break;
            }
        }

        // If dropped anywhere in the valid zone, snap to the NEXT AVAILABLE empty slot
        if (droppedInPanel) {
            const firstEmptyIndex = state.roster.findIndex(a => a === null);
            if (firstEmptyIndex !== -1) {
                targetSlotId = firstEmptyIndex;
                const targetSlotEl = document.querySelector(`.target-slot[data-slot-id="${firstEmptyIndex}"]`);
                if (targetSlotEl) {
                    const sRect = targetSlotEl.getBoundingClientRect();
                    targetX = sRect.left + (sRect.width - card.offsetWidth) / 2;
                    targetY = sRect.top + (sRect.height - card.offsetHeight) / 2;
                }
            }
        }

        // If it wasn't dropped in the panel OR the panel is completely full
        if (targetSlotId === null) {
            const phRect = placeholder.getBoundingClientRect();
            targetX = phRect.left;
            targetY = phRect.top;
        }

        card.style.left = targetX + 'px';
        card.style.top = targetY + 'px';

        setTimeout(() => {
            if(placeholder) placeholder.remove();
            resetCardStyles(card);
            
            if (targetSlotId !== null) {
                assignToSlot(appId, parseInt(targetSlotId));
            } else {
                updateUI();
            }
            activeCard = null;
        }, 150);
    });

    function resetCardStyles(card) {
        card.style.transition = 'none';
        card.style.position = 'relative';
        card.style.left = ''; 
        card.style.top = '';
        card.style.width = ''; 
        card.style.height = '';
        card.style.zIndex = '10';
    }

    function isOverSlot(x, y, slot) {
        const rect = slot.getBoundingClientRect();
        return (x > rect.left - 20 && x < rect.right + 20 && y > rect.top - 20 && y < rect.bottom + 20);
    }

    function assignToSlot(appId, slotId) {
        const app = state.pool.find(a => a.id === appId);
        if (!app) return;
        
        const currentOccupant = state.roster[slotId];
        const totalCost = state.roster.reduce((sum, a) => sum + (a ? a.cost : 0), 0);
        const replacementCost = currentOccupant ? currentOccupant.cost : 0;
        
        if (state.money < (totalCost - replacementCost + app.cost)) {
            alert("INSUFFICIENT FUNDS. You cannot afford this applicant.");
            updateUI();
            return;
        }

        state.roster[slotId] = app;
        updateUI();
    }

    function returnToPool(slotId) {
        state.roster[slotId] = null;
        updateUI();
    }

    // ══════════════════════════════════════════════
    // RESOLUTION LOGIC (V4.0 Math)
    // ══════════════════════════════════════════════

    function launchMission() {
        const hired = state.roster.filter(a => a !== null);
        if (hired.length === 0) return;

        const cost = hired.reduce((sum, app) => sum + app.cost, 0);
        state.money -= cost;

        let logs = [];
        let score = 0;

        // 1. RAW SKILL
        let statScores = [];
        state.mission.reqs.forEach(stat => {
            let sum = hired.reduce((acc, app) => acc + app[stat], 0);
            let pct = (sum / state.mission.targets[stat]) * 100;
            statScores.push(pct);
        });
        
        let rawScore = statScores.reduce((a,b)=>a+b, 0) / statScores.length;
        logs.push(`Base Power Output: ${Math.floor(rawScore)}%`);

        // 2. SHIP EFFICIENCY
        let effPct = hired.length / state.ship.min;
        let effMod = 0;
        if (hired.length === state.ship.max) { effMod = 5; logs.push(`Ship at Max Capacity: +5% Bonus`); }
        else if (effPct >= 1) { effMod = 0; logs.push(`Ship Minimum Crew Met: 0% Penalty`); }
        else if (effPct >= 0.7) { effMod = -20; logs.push(`Understaffed (Tier 1): -20% Penalty`); }
        else if (effPct >= 0.4) { effMod = -40; logs.push(`Understaffed (Tier 2): -40% Penalty`); }
        else if (effPct >= 0.15) { effMod = -60; logs.push(`Skeleton Crew (Tier 3): -60% Penalty`); }
        else { effMod = -70; logs.push(`Fatal Understaffing (Tier 4): -70% Penalty`); }

        // 3. CONFLICTS (Mutual Dominance Math)
        let conflictPenalty = 0;
        let conflictCount = 0;

        for(let i=0; i<hired.length; i++) {
            for(let j=i+1; j<hired.length; j++) {
                let a = hired[i]; let rA = RACES[a.race];
                let b = hired[j]; let rB = RACES[b.race];

                let aHatesB = rA.hates.includes(b.race) || rA.hates.includes("ALL");
                let bHatesA = rB.hates.includes(a.race) || rB.hates.includes("ALL");

                if (aHatesB && bHatesA) {
                    // Mutual Conflict! Compare 2 out of 3 stats
                    let aWins = 0, bWins = 0;
                    if(a.str > b.str) aWins++; else if(b.str > a.str) bWins++;
                    if(a.int > b.int) aWins++; else if(b.int > a.int) bWins++;
                    if(a.cha > b.cha) aWins++; else if(b.cha > a.cha) bWins++;

                    if (aWins > bWins) {
                        let pen = 10 + (a.hate/4); conflictPenalty += pen; conflictCount++;
                        logs.push(`MUTUAL: ${a.race} dominated ${b.race}. -${Math.floor(pen)}%`);
                    } else if (bWins > aWins) {
                        let pen = 10 + (b.hate/4); conflictPenalty += pen; conflictCount++;
                        logs.push(`MUTUAL: ${b.race} dominated ${a.race}. -${Math.floor(pen)}%`);
                    } else {
                        let penA = (10 + (a.hate/4))/2;
                        let penB = (10 + (b.hate/4))/2;
                        conflictPenalty += (penA + penB); conflictCount++;
                        logs.push(`MUTUAL DRAW: Bloody stalemate. -${Math.floor(penA+penB)}%`);
                    }
                } else if (aHatesB) {
                    let pen = 10 + (a.hate/4); conflictPenalty += pen; conflictCount++;
                    logs.push(`CONFLICT: ${a.race} attacked ${b.race}. -${Math.floor(pen)}%`);
                } else if (bHatesA) {
                    let pen = 10 + (b.hate/4); conflictPenalty += pen; conflictCount++;
                    logs.push(`CONFLICT: ${b.race} attacked ${a.race}. -${Math.floor(pen)}%`);
                }
            }
        }

        // 4. SYNERGY
        let synergy = 0;
        if (hired.length >= 3 && conflictCount === 0) {
            synergy = 10;
            logs.push(`SYNERGY BONUS: Perfect harmony. +10%`);
        }

        // CALC FINAL
        score = Math.floor(rawScore + effMod - conflictPenalty + synergy);
        
        let overperformance = 0;
        if (score > 100) {
            overperformance = Math.min(20, score - 100);
            score = 100;
        }
        if (score < 0) score = 0;

        // 5. PAYOUT VS FINE
        let earned = 0;
        let isSuccess = false;
        
        if (score >= state.mission.minReq) {
            isSuccess = true;
            earned = Math.floor(state.mission.reward * (score/100));
            if (overperformance > 0) {
                let bonus = Math.floor(state.mission.reward * (overperformance/100));
                earned += bonus;
                logs.push(`OVERPERFORMANCE BONUS: +${bonus} CR`);
            }
        } else {
            let diff = (state.mission.minReq - score) / 100;
            earned = -Math.floor(state.mission.reward * diff);
            logs.push(`FINE APPLIED: Mission requirement (${state.mission.minReq}%) not met.`);
        }

        state.money += earned;

        // Show Modal
        document.getElementById('res-score').innerText = score + "%";
        document.getElementById('res-msg').innerText = isSuccess ? "MISSION SUCCESS" : "MISSION FAILED";
        
        let logHTML = logs.map(l => `<div>> ${l}</div>`).join('');
        logHTML += `<br><div>> NET FINANCIAL CHANGE: ${earned >= 0 ? '+'+earned : earned} CR</div>`;
        document.getElementById('res-log').innerHTML = logHTML;

        document.getElementById('result-overlay').style.display = 'flex';

        if (state.money < 0) state.gameOver = true;
    }

    function nextDay() {
        document.getElementById('result-overlay').style.display = 'none';
        
        if (state.gameOver) {
            document.getElementById('res-title').innerText = "SYSTEM LOCKOUT";
            document.getElementById('res-score').innerText = "BANKRUPT";
            document.getElementById('res-score').style.color = "red";
            document.getElementById('res-msg').innerText = "Your career is over.";
            document.getElementById('res-log').innerHTML = "> Liquidating assets...<br>> Reclaiming organic material...";
            document.getElementById('modal-btn').innerText = "START OVER";
            
            // Override the button to manually reset the game instead of refreshing the page
            document.getElementById('modal-btn').onclick = function() {
                // 1. Reset Game Variables
                state.day = 1;
                state.money = 800;
                state.gameOver = false;
                state.roster = [];
                state.pool = [];
                
                // 2. Reset Modal UI styles back to normal
                document.getElementById('res-score').style.color = "";
                document.getElementById('modal-btn').innerText = "CONTINUE";
                
                // 3. Restore original button function
                document.getElementById('modal-btn').onclick = nextDay;
                
                // 4. Hide modal and restart
                document.getElementById('result-overlay').style.display = 'none';
                startDay();
            };
            
            document.getElementById('result-overlay').style.display = 'flex';
        } else {
            state.day++;
            startDay();
        }
    }

    // INIT
    function init() {
        startDay();
    }
    
    init();

</script>
</body>
</html>
